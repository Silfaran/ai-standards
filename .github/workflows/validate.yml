name: Validate framework

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  links:
    name: Internal markdown links
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Verify every relative link in every .md file points to a file that exists.
      # `--offline` skips HTTP(S) — we only care about framework-internal coherence
      # (an agent citing a standard file that got renamed would break silently).
      - name: Run lychee link checker
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --offline
            --no-progress
            --verbose
            --exclude-path '.git'
            './**/*.md'
          fail: true

  format:
    name: Content format checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Each entry in lessons-learned.md must match the documented one-line format:
      #   - [{agent|command}] {what went wrong} → {fix}
      # Catches drift where someone adds a multi-paragraph entry or forgets the role tag.
      - name: Validate lessons-learned entry format
        run: |
          set -e
          file="standards/lessons-learned.md"
          if [ ! -f "$file" ]; then
            echo "::error::$file is missing"
            exit 1
          fi
          # Any line starting with "- " that is not "- [Something]" is malformed.
          # Skip lines inside fenced code blocks (format example) by stripping those first.
          bad=$(awk '
            /^```/ { in_code = !in_code; next }
            !in_code && /^- / && !/^- \[/ { print NR": "$0 }
          ' "$file")
          if [ -n "$bad" ]; then
            echo "::error::Malformed lessons-learned entries (expected '- [{role}] ... → ...'):"
            echo "$bad"
            exit 1
          fi
          echo "lessons-learned.md format OK"

      # Every SKILL.md must declare `name`, `description`, `paths` in its frontmatter.
      # Agents rely on the `paths` glob for auto-loading; a missing field silently disables the skill.
      - name: Validate skill frontmatter
        run: |
          set -e
          failed=0
          for skill in .claude/skills/*/SKILL.md; do
            for field in name description paths; do
              if ! awk '/^---$/{c++; next} c==1' "$skill" | grep -qE "^${field}:"; then
                echo "::error file=$skill::missing required frontmatter field '$field'"
                failed=1
              fi
            done
          done
          if [ $failed -ne 0 ]; then exit 1; fi
          echo "Skill frontmatter OK"

  actions:
    name: Lint GitHub Actions templates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # actionlint lints every *.yml under .github/workflows AND any workflow
      # templates we ship under templates/ci/.
      - name: Run actionlint
        uses: reviewdog/action-actionlint@v1
        with:
          reporter: github-check
          fail_on_error: true
          actionlint_flags: >-
            -ignore "SC2086"

  markdown:
    name: Markdown lint (basic consistency)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Config and globs live in `.markdownlint-cli2.jsonc` at repo root;
      # the action auto-discovers it.
      - uses: DavidAnson/markdownlint-cli2-action@v18
