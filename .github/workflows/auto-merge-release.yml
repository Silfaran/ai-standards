name: Auto-merge Release PR

# Enables GitHub's auto-merge on any PR release-please opens (title
# "chore(master): release X.Y.Z", label "autorelease: pending"). GitHub
# will then merge the PR automatically once every required status check
# on validate.yml passes. A human is NOT in the loop — if you want to
# hold a release, close the PR (release-please will reopen it on the
# next push with your changes applied).
on:
  pull_request:
    types: [opened, reopened, synchronize, labeled]

permissions:
  contents: write
  pull-requests: write

jobs:
  enable-auto-merge:
    if: contains(github.event.pull_request.labels.*.name, 'autorelease: pending')
    runs-on: ubuntu-latest
    steps:
      - name: Enable auto-merge (squash)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: gh pr merge --auto --squash "$PR_URL"
