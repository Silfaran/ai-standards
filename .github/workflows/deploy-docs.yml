# Build the Astro Starlight docs site and deploy to GitHub Pages.
#
# Single source of truth for prose lives under `docs/src/content/docs/`;
# agent / command / critical-path / project-doc content is glob-imported
# from the repo root via `docs/scripts/sync.mjs` on every build, so the
# published site cannot drift from the framework. See
# `docs/src/content/docs/concepts/standards-and-critical-paths.md`
# § "Always-up-to-date guarantee" for the full mechanism.
#
# Deploys to `https://silfaran.github.io/ai-standards/` (override via
# `DOCS_SITE_URL` / `DOCS_BASE_PATH` env vars in `astro.config.mjs`).

name: Deploy docs site

on:
  push:
    branches: [master]
    paths:
      # Triggers on docs/ changes, but ALSO on any source the sync script
      # pulls from — otherwise an agent rename or new critical path would
      # not refresh the site.
      - 'docs/**'
      - 'agents/**'
      - 'commands/**'
      - 'standards/critical-paths/**'
      - 'ARCHITECTURE.md'
      - 'USAGE.md'
      - 'CHANGELOG.md'
      - '.github/workflows/deploy-docs.yml'
  workflow_dispatch:

# Concurrency: a new push cancels an in-flight deploy of the same kind.
concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: docs
    steps:
      - uses: actions/checkout@v5
        with:
          # Need the full repo so the sync script can read sources outside docs/.
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: docs/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build
        env:
          # Path is `/ai-standards` because the GitHub Pages URL is
          # `https://silfaran.github.io/ai-standards/`. If the site moves to
          # a custom domain (e.g. `docs.ai-standards.dev`), override these
          # via repo Variables and remove the `base` here.
          DOCS_SITE_URL: https://silfaran.github.io
          DOCS_BASE_PATH: /ai-standards

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
